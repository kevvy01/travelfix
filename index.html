<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge Marketplace — Bantul Creative Village</title>
  <meta name="description" content="Jelajahi ratusan tantangan kreatif dari UMKM dan komunitas Bantul. Temukan proyek sesuai keahlianmu dan mulai berkarya." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <!-- ══ NAVIGATION ════════════════════════════════════════ -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">

      <a href="index.html" class="nav-logo" aria-label="Bantul Creative Home">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="nav-logo-text">
          <span class="brand-name">Bantul Creative</span>
          <span class="brand-sub">Freelancer Trail</span>
        </div>
      </a>

      <div class="nav-tabs" role="tablist">
        <a href="ai-match.html"   class="nav-tab" role="tab" id="tab-ai">AI Match</a>
        <a href="index.html"      class="nav-tab" role="tab" id="tab-market">Marketplace</a>
        <a href="trail-map.html"  class="nav-tab" role="tab" id="tab-trail">Trail Map</a>
        <a href="portfolio.html"  class="nav-tab" role="tab" id="tab-portfolio">Impact Portfolio</a>
      </div>

      <div class="nav-right">
        <button class="notif-btn" aria-label="Notifikasi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge" aria-label="3 notifikasi">3</span>
        </button>
        <div class="user-pill" aria-label="Profil pengguna Nazwa">
          <div class="user-avatar">NS</div>
          <span class="user-name">Nazwa</span>
        </div>
      </div>

    </div>
  </nav>

  <!-- ══ PAGE ══════════════════════════════════════════════ -->
  <main class="page-wrapper">
    <div class="container">

      <!-- Sub-header -->
      <section class="subheader" aria-label="Marketplace Header">
        <div class="subheader-row">
          <div>
            <h1>Challenge Marketplace</h1>
            <p>Temukan tantangan kreatif dari UMKM dan komunitas Bantul yang menunggumu.</p>
          </div>
        </div>
        <div class="filter-row">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              type="search"
              id="search-input"
              class="search-input"
              placeholder="Cari proyek, kategori, atau lokasi..."
              aria-label="Cari proyek"
            />
          </div>
          <select id="status-filter" class="select-filter" aria-label="Filter status">
            <option value="">Semua Status</option>
            <option value="Open">Open</option>
            <option value="In Review">In Review</option>
            <option value="Closed">Closed</option>
          </select>
          <select id="category-filter" class="select-filter" aria-label="Filter kategori">
            <option value="">Semua Kategori</option>
            <option value="Desain Grafis">Desain Grafis</option>
            <option value="Branding">Branding</option>
            <option value="Fotografi">Fotografi</option>
            <option value="Videografi">Videografi</option>
            <option value="Web Dev">Web Dev</option>
            <option value="UI/UX">UI/UX</option>
            <option value="Digital Marketing">Digital Marketing</option>
            <option value="Konten">Konten</option>
            <option value="Ilustrasi">Ilustrasi</option>
            <option value="Seni Publik">Seni Publik</option>
            <option value="Musik">Musik</option>
            <option value="Audio Produksi">Audio Produksi</option>
          </select>
        </div>
      </section>

      <!-- Projects Grid -->
      <div class="section-title-row">
        <h2 class="section-title">Semua Proyek</h2>
        <span class="section-count">6 proyek tersedia</span>
      </div>

      <div class="marketplace-grid" id="marketplace-grid" role="list" aria-label="Daftar proyek marketplace">
        <!-- Rendered by app.js -->
      </div>

    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
